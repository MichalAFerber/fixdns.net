<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2545"/>
      <stop offset="1" stop-color="#12315f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.6">
      <stop offset="0" stop-color="#1d6feb" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1d6feb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand tile -->
  <rect x="90" y="96" width="150" height="150" rx="32" fill="#ffffff"/>
  <text x="165" y="171" text-anchor="middle" dominant-baseline="central"
        font-family="monospace" font-size="86" font-weight="700" fill="#0b2545">{ }</text>

  <!-- brand name -->
  <text x="272" y="150" dominant-baseline="central"
        font-family="monospace" font-size="72" font-weight="700" fill="#ffffff">FixDNS<tspan fill="#5aa2ff">.net</tspan></text>
  <text x="274" y="212" dominant-baseline="central"
        font-family="sans-serif" font-size="27" font-weight="400" fill="#aebfdc">DNS help, by the hour, by a real human</text>

  <!-- headline -->
  <text x="90" y="360" dominant-baseline="central"
        font-family="sans-serif" font-size="62" font-weight="800" fill="#ffffff">Your DNS is broken.</text>
  <text x="90" y="432" dominant-baseline="central"
        font-family="sans-serif" font-size="62" font-weight="800" fill="#5aa2ff">I&#8217;ll fix it on a Zoom call.</text>

  <!-- sub row -->
  <text x="90" y="516" dominant-baseline="central"
        font-family="sans-serif" font-size="30" font-weight="600" fill="#cdd8ee">DMARC &#183; SPF &#183; DKIM &#183; email deliverability &#183; from $85/hour</text>

  <!-- domain footer -->
  <rect x="90" y="556" width="1020" height="2" fill="#26406e"/>
  <text x="90" y="592" dominant-baseline="central"
        font-family="monospace" font-size="28" font-weight="700" fill="#ffffff">fixdns.net</text>
  <text x="1110" y="592" text-anchor="end" dominant-baseline="central"
        font-family="sans-serif" font-size="24" font-weight="500" fill="#8fa4c9">MailerLite Certified Expert</text>
</svg>
